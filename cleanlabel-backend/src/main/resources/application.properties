server.port=8080
server.servlet.context-path=/cleanlabel-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cleanlabel}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase gestisce schema e seed ? Hibernate si limita a validare
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Caffeine cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m