services:
  postgres:
    image: postgres:16
    container_name: cleanlabel-db
    environment:
      POSTGRES_DB: cleanlabel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"       # host:container — espone il DB sulla tua macchina
    volumes:
      - cleanlabel_data:/var/lib/postgresql/data   # i dati sopravvivono al restart

volumes:
  cleanlabel_data: