version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: cleanlabel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cleanlabel_db
      MYSQL_USER: cleanlabel_user
      MYSQL_PASSWORD: cleanlabel_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: