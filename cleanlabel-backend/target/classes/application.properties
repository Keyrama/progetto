server.port=8080
server.servlet.context-path=/cleanlabel-backend

spring.datasource.url=jdbc:mysql://localhost:3306/cleanlabel_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=cleanlabel_user
spring.datasource.password=cleanlabel_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.open-in-view=false