server.port=8080
server.servlet.context-path=/cleanlabel-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cleanlabel}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# Seed data loaded after schema creation
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
# Needed so Hibernate creates tables before data.sql runs
spring.jpa.defer-datasource-initialization=true

# Caffeine cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m