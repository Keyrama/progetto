<div class="filter-card card p-3">
  <h6 class="fw-bold mb-3"><i class="bi bi-funnel me-2"></i>Filtra</h6>

  <!-- Ricerca -->
  <div class="mb-3">
    <label class="form-label small fw-semibold text-muted">RICERCA</label>
    <div class="search-wrapper">
      <i class="bi bi-search"></i>
      <input type="text" class="form-control form-control-sm"
             placeholder="Nome o brand…"
             [ngModel]="filter.search"
             (ngModelChange)="onSearchChange($event)" />
    </div>
  </div>

  <!-- Categorie -->
  <div class="mb-3">
    <label class="form-label small fw-semibold text-muted">CATEGORIA</label>
    <div class="form-check">
      <input class="form-check-input" type="radio" id="cat-all" name="category"
             [checked]="!filter.category"
             (change)="onCategoryChange(undefined)" />
      <label class="form-check-label small" for="cat-all">Tutte</label>
    </div>
    <div *ngFor="let cat of categories" class="form-check">
      <input class="form-check-input" type="radio"
             [id]="'cat-' + cat.id" name="category"
             [checked]="filter.category === cat.id"
             (change)="onCategoryChange(cat.id)" />
      <label class="form-check-label small" [for]="'cat-' + cat.id">{{ cat.name }}</label>
    </div>
  </div>

  <!-- Clean Label -->
  <div class="mb-3">
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="cleanSwitch"
             [ngModel]="filter.cleanLabel"
             (ngModelChange)="onCleanLabelChange($event)" />
      <label class="form-check-label small" for="cleanSwitch">
        <i class="bi bi-leaf text-success me-1"></i>Solo Clean Label
      </label>
    </div>
  </div>

  <button class="btn btn-outline-secondary btn-sm w-100" (click)="onReset()">
    <i class="bi bi-x-circle me-1"></i>Reset filtri
  </button>
</div>
