<div class="card border-0 shadow-sm rounded-3">
  <div class="card-header d-flex justify-content-between align-items-center bg-white border-bottom">
    <h6 class="mb-0 fw-bold"><i class="bi bi-tag me-2 text-success"></i>Categorie</h6>
    <button class="btn btn-sm btn-primary" (click)="createRequested.emit()">
      <i class="bi bi-plus-lg me-1"></i>Nuova
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-4">
    <div class="spinner-border spinner-border-sm text-success"></div>
  </div>

  <ul class="list-group list-group-flush" *ngIf="!loading">
    <li *ngFor="let cat of categories"
        class="list-group-item d-flex justify-content-between align-items-center">
      <div>
        <span class="fw-semibold">{{ cat.name }}</span>
        <small *ngIf="cat.description" class="text-muted ms-2">{{ cat.description }}</small>
      </div>
      <div class="d-flex gap-1">
        <button class="btn btn-xs btn-outline-secondary" (click)="editRequested.emit(cat)" title="Modifica">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-xs btn-outline-danger" (click)="deleteRequested.emit(cat)" title="Elimina">
          <i class="bi bi-trash"></i>
        </button>
      </div>
    </li>
    <li *ngIf="categories.length === 0" class="list-group-item text-muted text-center py-3">
      Nessuna categoria. Creane una.
    </li>
  </ul>
</div>

<nav *ngIf="totalCategories > criteria.limit" class="d-flex justify-content-center mt-3">
  <ul class="pagination pagination-sm mb-0">
    <li class="page-item" [class.disabled]="criteria.offset === 0">
      <button class="page-link" (click)="onPageChange({first: criteria.offset - criteria.limit, rows: criteria.limit})">
        <i class="bi bi-chevron-left"></i>
      </button>
    </li>
    <li class="page-item disabled">
      <span class="page-link">
        {{ criteria.offset / criteria.limit + 1 }} / {{ Math.ceil(totalCategories / criteria.limit) }}
      </span>
    </li>
    <li class="page-item" [class.disabled]="criteria.offset + criteria.limit >= totalCategories">
      <button class="page-link" (click)="onPageChange({first: criteria.offset + criteria.limit, rows: criteria.limit})">
        <i class="bi bi-chevron-right"></i>
      </button>
    </li>
  </ul>
</nav>
