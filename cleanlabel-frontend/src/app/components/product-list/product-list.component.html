<div class="container py-4">
  <div class="row g-4">

    <!-- Sidebar filtri -->
    <div class="col-lg-3">
      <app-product-filter
        [filter]="filter"
        (filterChange)="onFilterChange($event)"
        (reset)="onResetFilter()">
      </app-product-filter>
    </div>

    <!-- Griglia prodotti -->
    <div class="col-lg-9">

      <!-- Header risultati -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-muted small">
          <strong>{{ totalElements }}</strong> prodotti trovati
        </span>
      </div>

      <!-- Loading -->
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border" role="status"></div>
        <p class="mt-2 text-muted">Caricamento prodotti…</p>
      </div>

      <!-- Empty state -->
      <div *ngIf="!loading && products.length === 0" class="text-center py-5">
        <i class="bi bi-search" style="font-size:3rem;color:#ccc;"></i>
        <p class="mt-3 text-muted">Nessun prodotto trovato con i filtri selezionati.</p>
        <button class="btn btn-primary btn-sm" (click)="onResetFilter()">Reset filtri</button>
      </div>

      <!-- Grid -->
      <div *ngIf="!loading && products.length > 0"
           class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">
        <div class="col" *ngFor="let product of products">
          <app-product-card
            [product]="product"
            (selected)="onProductSelected($event)">
          </app-product-card>
        </div>
      </div>

      <!-- Paginazione client-side -->
      <nav *ngIf="totalPages > 1" class="mt-4 d-flex justify-content-center">
        <ul class="pagination pagination-sm">
          <li class="page-item" [class.disabled]="currentPage === 0">
            <button class="page-link" (click)="goToPage(currentPage - 1)">
              <i class="bi bi-chevron-left"></i>
            </button>
          </li>
          <li *ngFor="let p of pageRange" class="page-item" [class.active]="p === currentPage">
            <button class="page-link" (click)="goToPage(p)">{{ p + 1 }}</button>
          </li>
          <li class="page-item" [class.disabled]="currentPage === totalPages - 1">
            <button class="page-link" (click)="goToPage(currentPage + 1)">
              <i class="bi bi-chevron-right"></i>
            </button>
          </li>
        </ul>
      </nav>

    </div>
  </div>
</div>
