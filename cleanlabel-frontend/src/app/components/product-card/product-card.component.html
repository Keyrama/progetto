<div class="card product-card h-100" (click)="onClick()">
  <div class="card-body d-flex flex-column p-3">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <div class="flex-grow-1 me-2">
        <h6 class="card-title mb-1 fw-bold">{{ product.name }}</h6>
        <small class="text-muted">{{ product.brand }}</small>
      </div>
      <div [class]="'score-badge flex-shrink-0 ' + scoreClass">
        {{ product.healthScore ?? '?' }}
      </div>
    </div>

    <p class="card-text text-muted small flex-grow-1"
       style="font-size:.82rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
       {{ product.description }}
    </p>

    <div class="d-flex align-items-center justify-content-between mt-2">
      <!-- categoryName is the flat string from the backend DTO -->
      <span *ngIf="product.categoryName" class="badge bg-light text-secondary border"
            style="font-size:.72rem;">
        {{ product.categoryName }}
      </span>
      <span *ngIf="product.cleanLabel" class="clean-badge">
        <i class="bi bi-check-circle-fill me-1"></i>Clean
      </span>
    </div>
  </div>
</div>
